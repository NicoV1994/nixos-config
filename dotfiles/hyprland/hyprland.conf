# hyprland.conf (managed via Home Manager)
# Source: extracted from current local Hyprland config

# Monitor setup
monitor = , preferred, auto, 1

# Programs
$terminal = ghostty 
$fileManager = thunar 
$menu = wofi --show drun

# Autostart
exec-once = hyprpaper
exec-once = nm-applet --indicator
exec-once = [silent] [workspace 1] teams-for-linux
exec-once = [silent] [workspace 2] brave
exec-once = [silent][workspace 9] bitwarden

# Now switch to workspace 3 — after windows have been spawned
exec-once = hyprctl dispatch workspace 3
exec-once = [workspace 3] ghostty

# Environment
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# General
general {
  gaps_in = 5
  gaps_out = 5
  border_size = 2
  col.active_border = rgba(ff9e64ee)
  col.inactive_border = rgba(595959aa)
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
}

decoration {
  rounding = 10
  active_opacity = 1.0
  inactive_opacity = 1.0
  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }
  blur {
    enabled = true
    size = 3
    passes = 1
    vibrancy = 0.1696
  }
}

animations {
  enabled = yes, please :)
  bezier = easeOutQuint,0.23,1,0.32,1
  bezier = easeInOutCubic,0.65,0.05,0.36,1
  bezier = linear,0,0,1,1
  bezier = almostLinear,0.5,0.5,0.75,1.0
  bezier = quick,0.15,0,0.1,1
  animation = global, 1, 10, default
  animation = border, 1, 5.39, easeOutQuint
  animation = windows, 1, 4.79, easeOutQuint
  animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
  animation = windowsOut, 1, 1.49, linear, popin 87%
  animation = fadeIn, 1, 1.73, almostLinear
  animation = fadeOut, 1, 1.46, almostLinear
  animation = fade, 1, 3.03, quick
  animation = layers, 1, 3.81, easeOutQuint
  animation = layersIn, 1, 4, easeOutQuint, fade
  animation = layersOut, 1, 1.5, linear, fade
  animation = fadeLayersIn, 1, 1.79, almostLinear
  animation = fadeLayersOut, 1, 1.39, almostLinear
  animation = workspaces, 1, 1.94, almostLinear, fade
  animation = workspacesIn, 1, 1.21, almostLinear, fade
  animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
  preserve_split = true
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = -1
  disable_splash_rendering = true
}

input {
  kb_layout = at,us
  kb_options = grp:win_space_toggle
  follow_mouse = 1
  sensitivity = 0
  touchpad {
  	natural_scroll = false
  }
}

device {
  name = epic-mouse-v1
  sensitivity = -0.5
}

$mainMod = SUPER

# Keybindings
bind = $mainMod, Q, killactive
bind = SUPER_SHIFT, R, exec, sh -c 'hyprctl reload; systemctl --user restart waybar.service; pkill hyprpaper; hyprpaper &'
bind = $mainMod, RETURN, exec, $terminal
bind = SUPER_SHIFT, E, exit
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, D, exec, $menu
bind = $mainMod, N, exec, sh -c 'mkdir -p "$HOME/notes" && while true; do note="$HOME/notes/$(date +%Y-%m-%d-%H-%M-%S).md"; ( set -C; : > "$note" ) 2>/dev/null && break; sleep 1; done; exec ghostty -e nvim "$note"'
bind = $mainMod, P, pseudo
bind = SUPER_SHIFT, P, exec, poweroff
bind = SUPER_SHIFT, O, exec, gtklock
bind = SUPER_SHIFT, F, fullscreen
bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mainMod, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

binde = SUPER_ALT, H, moveactive, -20 0
binde = SUPER_ALT, L, moveactive, 20 0
binde = SUPER_ALT, K, moveactive, 0 -20
binde = SUPER_ALT, J, moveactive, 0 20

binde = SUPER_ALT_SHIFT, H, resizeactive, -20 0
binde = SUPER_ALT_SHIFT, L, resizeactive, 20 0
binde = SUPER_ALT_SHIFT, K, resizeactive, 0 -20
binde = SUPER_ALT_SHIFT, J, resizeactive, 0 20

bind = SUPER_SHIFT, H, swapwindow, l
bind = SUPER_SHIFT, L, swapwindow, r
bind = SUPER_SHIFT, J, swapwindow, d
bind = SUPER_SHIFT, K, swapwindow, u

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = SUPER_CTRL, 3, exec, sh -c 'repo="$HOME/Haggla/Milon/milon-care-next"; tmux has-session -t milon-dev 2>/dev/null || tmux new-session -d -s milon-dev -c "$repo"; ghostty --working-directory="$repo" -e tmux attach-session -t milon-dev & code "$repo"'

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = SUPER_CTRL, H, movecurrentworkspacetomonitor, l
bind = SUPER_CTRL, L, movecurrentworkspacetomonitor, r
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ --limit 1.0
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule = suppress_event maximize, match:class .*
windowrule = no_initial_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0
